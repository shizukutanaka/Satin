# Satin CI ワークフロー定義
#
# ※ このファイルは setup/ 配下に置いています。GitHub App トークンには
#    `workflows` 権限が無く .github/workflows/ への push が拒否されるため、
#    ここに保管しています。CI を有効化するには、リポジトリ所有者が手動で
#    以下を実行してください:
#
#        mkdir -p .github/workflows
#        cp setup/github-actions-ci.yml .github/workflows/ci.yml
#        git add .github/workflows/ci.yml && git commit && git push
#
# -----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 espeak espeak-data

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tqdm pillow numpy pytest pytest-asyncio flask httpx \
                      psutil tenacity matplotlib beautifulsoup4 pydub

      - name: Syntax check all main modules
        run: |
          python -m py_compile $(find main -name "*.py" | sort)

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          PYTHONPATH: main
